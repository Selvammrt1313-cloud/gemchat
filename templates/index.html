<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Study AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-container">
        <h2>📚 Gemini Study Assistant</h2>
        <div class="chat-box" id="chat-box">
            <div class="bot-message">Hello! Ask me any study question (e.g., "What is Ohm's Law?").</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your question here...">
            <button onclick="sendMessage()">Ask</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value.trim();

            if (!message) return;

            // Append user message
            chatBox.innerHTML += `<div class="user-message">${message}</div>`;
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Fetch response from Python backend
            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                
                // Append bot response
                chatBox.innerHTML += `<div class="bot-message">${data.reply || data.error}</div>`;
            } catch (error) {
                chatBox.innerHTML += `<div class="bot-message-error">Error connecting to server.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
